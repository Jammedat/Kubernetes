apiVersion: v1
kind: Pod
metadata:
  name: pod-nautilus
  labels:
    app: demo
spec:
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: pvc-nautilus

  containers:
  - name: container-nautilus
    image: httpd:latest
    volumeMounts:
    - mountPath: /var/www/html
      name: data
    ports:
    - containerPort: 80
  
---
apiVersion: v1
kind: Service
metadata:
  name: web-nautilus
spec:
  type: NodePort
  selector:
    app: demo
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30008
