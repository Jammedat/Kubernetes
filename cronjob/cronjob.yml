apiVersion: batch/v1
kind: CronJob
metadata:
  name: devops
spec:
  schedule: "*/3 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cron-devops 
            image: httpd:latest
            command:
            - /bin/sh
            - c; echo Welcome to xfusioncorp!
            ports:
            - containerPort: 80
          restartPolicy: OnFailure

          